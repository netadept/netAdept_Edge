<html lang="en">
<head>

    <link rel="stylesheet" href="../static/CSS/style.css">
   	<header class="header">
    </header>
</head>
<body>
    <div style="text-align: center">
        <nav>
            <span class="head">
                <a href="{{ url_for('dashboard') }}">
                    <svg height="50" width="200" fill="none" >
                        <image height="50" width="200" href="../../static/m1.svg"/>
                    </svg>
                </a>
            </span>
        </nav>

        <br><br><br>
          <div style="color:burlywood">
            <br><br>
            <div style="text-align: center">

            <span>
                <a href="{{ url_for('dashboard') }}">
            <svg height="150" width="400" fill="none">
                <image height="150" width="400" href="../../static/m1.svg"/>
            </svg>
                </a>
            </span>

            </div>
            <br><br>

            <div style="text-align: center;">

                </a>
            </div>
            <br><br>

                <br>
                <div class="logreg">
                    <form method="POST">
                        <label for="email" class="labels">Email:</label>

                        <input type="text" name="username" placeholder="Enter username" required class="select_box" ><br><br>
                    
                        <label for="password" class="labels">Password:</label>
                        <input type="password" name="password" placeholder="Enter password" required class="select_box" ><br><br>
                    
                        <input type="submit" value="Submit" class="button">
                    </form>
                </div>
            </div>
      </div>
