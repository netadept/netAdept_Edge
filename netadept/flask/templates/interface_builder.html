{% extends "secondbase.html" %}
{% block content %}

<br><br>    
    <div class="container">
      <span class="filters">AMEND INTERFACES:  </span><br><br>

    <form method="POST"  id="rteform" name="rteform"> 

        <label for="int_name">Interface :</label>
        <input type="text" id="int_name" name="int_name" placeholder=" "  required><br>

        <label for="int_desc">Description :</label>
        <input type="text" id="int_desc" name="int_desc"><br>

        <label for="int_type">Interface Type :</label>
        <select id="int_type" name="int_type" placeholder=" " required>
          <option value="ip">IP</option>
          <option value="vlan">VLAN</option>
          <option value="loop">Loopback</option>
          <option value="sub">Sub Interface</option>
          <option value="access">Access</option>
          <option value="trunk">Trunk</option>
          <option value="delete">Delete</option>
        </select><br>

        <label for="vid">Interface VLAN :</label>
        <input type="text" id="vid" name="vid" ><br>

        <label for="allowed">Allowed VLANs (trunk) :</label>
        <input type="text" id="allowed" name="allowed" ><br>

        <label for="int_address">IP Address :</label>
        <input type="text" id="int_address" name="int_address"><br>

        <!--label for="route">Delete or Create :</label>
        <select id="delete" name="delete" placeholder=" " required>
          <option value="False">Create</option>
          <option value="True">Delete</option>
        </select><br-->
        <br>
      <input type="submit" value="Submit"><br>
    </div>
        
    </form>


{% endblock content %}
