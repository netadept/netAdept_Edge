{% extends "secondbase.html" %}
{% block content %}
<br><br><br>
    <h2 style="color:burlywood">Upload File </h2><br><br>
    <div class="container">
        <!--form action = "/upload_success" method = "post" enctype="multipart/form-data"-->  
        <form method = "post" enctype="multipart/form-data">  
            <input type="file" name="file" class="select_box" required>  
            <input type = "submit" class="button" value="Upload">  
        </form>  
    </div>
    <div class="container">
        <table class="table" style="width: 500px;">
            <colgroup>
              <col style="width: 400px;">
              <col style="width: 15px;">
              <col style="width: 15px;">
              <col style="width: 15px;">
            </colgroup>
            <tr class="headings">
                {% for head in headings %}
                <th>{{head}}</th>
                {% endfor %}
            </tr>
            {% for rows in data %}
            {% set filename = rows[0] %}
                <tr>
                    {% for cell in rows %}
                    <td>
                        {{cell}}
                    </td>
                    {% endfor %}
                    <td>
                        <a href="{{ url_for('delete_files_select', filename=filename)}}"> 
                            <svg height="25" width="35">
                                <image height="20" width="30" href="../static/delete.svg" />
                            </svg>
                        </a>
                    </td>
                    <td>
                        <a href="{{ url_for('download', filename=filename)}}"> 
                            <svg height="30" width="40">
                                <image height="30" width="40" href="../static/download.svg" />
                            </svg>
                        </a>
                    </td>
                    <td>
                        <a href="{{ url_for('filesend_confirm', filename=filename)}}" title="Send {{filename}} file: to device: {{singleselect}}" > 
                            <svg height="20" width="30">
                                <image height="20" width="30" href="../static/send.svg"/>
                            </svg>
                        </a>
                    </td>
                </tr>
            {% endfor %}
        </table><br>
        <a class="button" onclick="location.reload()">Update</a> 
    </div>

{% endblock content %}
