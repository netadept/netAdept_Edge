version: '3'

services:
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: netadept
    ports:
      - 27017:27017
    volumes: # optional to preserve database after container is deleted.
      #- ./database-data:/data/db
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://root:netadept@mongo:27017/"
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: netadept

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
    