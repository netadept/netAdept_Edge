{% extends "secondbase.html" %}
{% block content %}
<body>
    <div>
        <br><br><br>
        <h2 style="color:rgb(222, 184, 135)">CREATE A DEVICE </h2><br>
        <div class="container">
            <form method="POST">
                <label for="text" class="labels">Device:</label>
                <input type="text" name="device" placeholder="Device Name" class="select_box" required style="width: 570px;"><br><br>
            
                <label for="ip" class="labels">IP Address:</label>
                <input type="text" name="ip" placeholder="IP Address" class="select_box" required style="width: 570px;"><br><br>
        
                <label for="platform" class="labels">Platform:</label>
                <select name="platform" placeholder="Device Platform" class="select_box" required style="width: 585px;"> <br><br>
                  <option value="" disabled selected>Select</option>
                  <option>ios</option> 
                  <option>junos</option> 
                  <option>huawei_vrp</option> 
                  <option>fortinet</option> 
                </select><br><br>

                <label for="port" class="labels">Port:</label>
                <input type="text" name="port" placeholder="Device Port" class="select_box" required  style="width: 570px;"><br><br>  

                <label for="groups" class="labels">Groups:</label>
                <select id="group1" name="group1" > 
                  <option value="ALL" >Select Group</option>
                  {% for grp in grouplist %}
                  <option>
                  {{grp}}
                  </option> 
                  {% endfor %}
                </select>

                <select id="group2" name="group2"> 
                  <option value="ALL">Select Group</option>
                  {% for grp in grouplist %}
                  <option>
                  {{grp}}
                  </option> 
                  {% endfor %}
                </select>
                
                <select id="group3" name="group3"> 
                  <option value="ALL">Select Group</option>
                  {% for grp in grouplist %}
                  <option>
                  {{grp}}
                  </option> 
                  {% endfor %}
                </select>

                <select id="group4" name="group4"> 
                  <option value="ALL">Select Group</option>
                  {% for grp in grouplist %}
                  <option>
                  {{grp}}
                  </option> 
                  {% endfor %}
                </select>

                <select id="group5" name="group5"> 
                  <option value="ALL">Select Group</option>
                  {% for grp in grouplist %}
                  <option>
                  {{grp}}
                  </option> 
                  {% endfor %}
                </select>

                <br><br>

                <label for="text" class="labels">SNMP:</label>
                <input type="text" name="snmpver" placeholder="SNMP Version" class="select_box" required style="width: 240px;" required>
                <input type="password" name="snmpcom" placeholder="SNMP Community" class="select_box" required style="width: 240px;" required>
                <input type="text" name="snmpgrp" placeholder="Zabbix Group" class="select_box" required style="width: 240px;" required>
                <br><br>
                <input type="submit" value="Add" class="button" style="width: 890px;" name="add"><br><br>
            </form>
        </div>
    </div>

    <div class="container">
        <h2 style="color:rgb(222, 184, 135)">DEVICES: </h2><br>
        <table class="table">
            <tr class="headings">
                {% for head in headings %}
                <th>{{head}}</th>
                {% endfor %}
            </tr>

            {% for rows in data %}
            {% set devicename = rows[0] %}
                <tr>
                    {% for cell in rows %}
                    <td>
                        {{cell}}
                    </td>
                    {% endfor %}
                    <td>
                        <a href="{{ url_for('del_select', devicename=devicename)}}"> 
                            <svg height="25" width="35">
                                <image height="20" width="30" href="../static/delete.svg" />
                            </svg>
                        </a>
                    </td>
                </tr>
            {% endfor %}
        </table><br>
        <a href="{{ url_for('update_hostfile') }}" class="button">Update</a> 
    </div>
</body>
{% endblock content %}
